<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoeCast 管理画面</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
            surface: { DEFAULT: '#0f172a', card: '#1e293b', input: '#0f172a' },
            accent: { red: '#ef4444', green: '#22c55e', yellow: '#eab308', blue: '#38bdf8' },
          }
        }
      }
    }
  </script>
  <style>
    .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-overlay.hidden { display: none; }
    .panel { display: none; }
    .panel.active { display: block; }
    .tab { border-bottom: 3px solid transparent; }
    .tab.active { color: #818cf8; border-bottom-color: #818cf8; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75em; font-weight: 600; }
    .badge.active { background: #22c55e; color: white; }
    .badge.inactive { background: #475569; color: white; }
    .badge.expired { background: #ef4444; color: white; }

    .btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; }
    .btn-secondary { background: #334155; color: #cbd5e1; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-sm { padding: 6px 14px; font-size: 0.8em; }
    .btn-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.85em; color: #94a3b8; margin-bottom: 6px; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 2px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 0.95em; outline: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: #6366f1; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 500; }
    .modal-overlay.hidden { display: none; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    .data-table th { text-align: left; padding: 8px 12px; color: #94a3b8; border-bottom: 1px solid #334155; font-weight: normal; }
    .data-table td { padding: 8px 12px; border-bottom: 1px solid #1e293b; }
    .data-table tr:hover { background: #0f172a; }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }

    .qr-container { display: flex; gap: 24px; flex-wrap: wrap; }
    .qr-item { text-align: center; background: #0f172a; border-radius: 12px; padding: 16px; flex: 1; min-width: 200px; }
    .qr-item h4 { font-size: 0.9em; margin-bottom: 8px; color: #94a3b8; }
    .qr-item img { display: block; margin: 0 auto 8px; border-radius: 8px; }
    .qr-url { font-size: 0.7em; color: #475569; word-break: break-all; margin-top: 8px; }
    .qr-buttons { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }
    .qr-buttons button { padding: 6px 12px; border: none; border-radius: 8px; font-size: 0.75em; cursor: pointer; background: #334155; color: #cbd5e1; }
    .qr-buttons button:hover { background: #475569; }
    .copy-ok { color: #22c55e !important; }
  </style>
</head>
<body class="bg-surface min-h-screen font-sans text-slate-200">

  <!-- ログイン -->
  <div class="login-overlay" id="loginOverlay">
    <div class="bg-surface-card rounded-3xl p-8 w-[90%] max-w-[360px] text-center shadow-2xl border border-slate-700/50">
      <div class="text-3xl mb-3">🔐</div>
      <h2 class="text-xl font-bold mb-2 text-brand-light">KoeCast 管理画面</h2>
      <p class="text-sm text-slate-400 mb-5">パスワードを入力してください</p>
      <div class="text-red-400 text-sm mb-3" id="loginError" style="display:none">パスワードが正しくありません</div>
      <input type="password" id="passwordInput" placeholder="パスワード" autocomplete="off"
        class="w-full p-4 border-2 border-slate-600 rounded-xl bg-surface text-slate-200 text-base text-center outline-none focus:border-brand mb-4">
      <button onclick="doLogin()"
        class="w-full p-4 border-none rounded-xl bg-gradient-to-r from-brand to-brand-light text-white text-base font-bold cursor-pointer hover:shadow-lg hover:shadow-brand/30 transition-all">
        ログイン
      </button>
    </div>
  </div>

  <!-- ヘッダー -->
  <div class="bg-surface-card px-6 py-4 flex items-center justify-between border-b border-slate-700/50">
    <div class="flex items-center gap-2">
      <span class="text-xl">⚙️</span>
      <h1 class="text-lg font-bold text-brand-light">KoeCast 管理画面</h1>
    </div>
    <div class="text-xs text-slate-400" id="headerStats">-</div>
  </div>

  <!-- タブ -->
  <div class="flex bg-surface-card border-b border-slate-700/50 overflow-x-auto">
    <div class="tab active px-5 py-3 cursor-pointer text-slate-400 text-sm whitespace-nowrap hover:text-slate-200 transition-colors" data-panel="dashboard" onclick="switchTab(this)">ダッシュボード</div>
    <div class="tab px-5 py-3 cursor-pointer text-slate-400 text-sm whitespace-nowrap hover:text-slate-200 transition-colors" data-panel="rooms" onclick="switchTab(this)">ルーム管理</div>
    <div class="tab px-5 py-3 cursor-pointer text-slate-400 text-sm whitespace-nowrap hover:text-slate-200 transition-colors" data-panel="roomDetail" id="tabDetail" style="display:none" onclick="switchTab(this)">ルーム詳細</div>
  </div>

  <div class="p-5 max-w-[900px] mx-auto">
    <!-- ダッシュボード -->
    <div class="panel active" id="panelDashboard">
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6">
        <div class="bg-surface-card rounded-xl p-4 text-center border border-slate-700/50"><div class="text-3xl font-bold text-brand-light" id="statRooms">-</div><div class="text-xs text-slate-400 mt-1">ルーム数</div></div>
        <div class="bg-surface-card rounded-xl p-4 text-center border border-slate-700/50"><div class="text-3xl font-bold text-accent-red" id="statHosts">-</div><div class="text-xs text-slate-400 mt-1">配信中</div></div>
        <div class="bg-surface-card rounded-xl p-4 text-center border border-slate-700/50"><div class="text-3xl font-bold text-accent-green" id="statListeners">-</div><div class="text-xs text-slate-400 mt-1">聴講者</div></div>
        <div class="bg-surface-card rounded-xl p-4 text-center border border-slate-700/50"><div class="text-3xl font-bold text-accent-yellow" id="statMemory">-</div><div class="text-xs text-slate-400 mt-1">メモリ (MB)</div></div>
        <div class="bg-surface-card rounded-xl p-4 text-center border border-slate-700/50"><div class="text-3xl font-bold text-accent-blue" id="statUptime">-</div><div class="text-xs text-slate-400 mt-1">稼働時間</div></div>
      </div>
      <h3 class="text-sm font-semibold mb-3 text-accent-blue">アクティブルーム</h3>
      <div id="activeRoomList" class="flex flex-col gap-3">
        <div class="text-center text-slate-500 py-6">アクティブなルームはありません</div>
      </div>
    </div>

    <!-- ルーム管理 -->
    <div class="panel" id="panelRooms">
      <div class="btn-group mb-4">
        <button class="btn btn-primary" onclick="showCreateRoom()">+ 新規ルーム作成</button>
      </div>
      <div id="roomList" class="flex flex-col gap-3">
        <div class="text-center text-slate-500 py-6">ルームがありません</div>
      </div>
    </div>

    <!-- ルーム詳細 -->
    <div class="panel" id="panelRoomDetail">
      <div class="text-sm text-slate-400 cursor-pointer mb-4 hover:text-slate-200 transition-colors" onclick="closeDetail()">&larr; ルーム一覧に戻る</div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- ルーム作成/編集モーダル -->
  <div class="modal-overlay hidden" id="roomModal">
    <div class="bg-surface-card rounded-2xl p-6 w-[90%] max-w-[500px] max-h-[80vh] overflow-y-auto border border-slate-700/50 shadow-2xl">
      <h2 class="text-lg font-bold mb-4 text-brand-light" id="modalTitle">新規ルーム作成</h2>
      <input type="hidden" id="modalMode" value="create">
      <div class="form-group">
        <label>ルームID（英数字・半角、変更不可）</label>
        <input type="text" id="formRoomId" placeholder="例: factory-a">
      </div>
      <div class="form-group">
        <label>ルーム名</label>
        <input type="text" id="formRoomName" placeholder="例: 工場Aライン見学">
      </div>
      <div class="form-group">
        <label>説明（任意）</label>
        <textarea id="formRoomDesc" placeholder="見学グループの概要など"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>開始日時（任意）</label>
          <input type="datetime-local" id="formStartsAt">
        </div>
        <div class="form-group">
          <label>終了日時（任意）</label>
          <input type="datetime-local" id="formExpiresAt">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="saveRoom()">保存</button>
        <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script>
    // qrcode-generator を使ったQRコード DataURL生成
    function generateQRDataURL(text, color) {
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      // SVGベースでDataURL生成
      const size = qr.getModuleCount();
      const cellSize = 4;
      const margin = 8;
      const imgSize = size * cellSize + margin * 2;
      const canvas = document.createElement('canvas');
      canvas.width = imgSize;
      canvas.height = imgSize;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0, imgSize, imgSize);
      ctx.fillStyle = color || '#000000';
      for (let row = 0; row < size; row++) {
        for (let col = 0; col < size; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(col * cellSize + margin, row * cellSize + margin, cellSize, cellSize);
          }
        }
      }
      return canvas.toDataURL('image/png');
    }
  </script>
  <script>
    let token = '';
    let ws = null;
    let allRooms = [];
    let currentDetailRoom = null;

    // --- セッション復元 ---
    (function restoreSession() {
      const saved = sessionStorage.getItem('koecast_admin_token');
      if (saved) {
        token = saved;
        // 非同期で検証
        fetch('/api/stats', { headers: { 'Authorization': `Bearer ${saved}` } })
          .then(res => {
            if (res.ok) {
              document.getElementById('loginOverlay').classList.add('hidden');
              init();
            } else {
              sessionStorage.removeItem('koecast_admin_token');
              token = '';
            }
          }).catch(() => {});
      }
    })();

    // --- ログイン ---
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const pw = document.getElementById('passwordInput').value;
      token = pw;
      try {
        const res = await api('GET', '/api/stats');
        if (res.ok) {
          sessionStorage.setItem('koecast_admin_token', pw);
          document.getElementById('loginOverlay').classList.add('hidden');
          init();
        } else {
          document.getElementById('loginError').style.display = 'block';
        }
      } catch {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    async function api(method, path, body) {
      const opts = {
        method,
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      };
      if (body) opts.body = JSON.stringify(body);
      return fetch(path, opts);
    }

    async function apiJSON(method, path, body) {
      const res = await api(method, path, body);
      return res.json();
    }

    // --- 初期化 ---
    function init() {
      loadRooms();
      loadStats();
      connectAdminWS();
      setInterval(loadStats, 10000);
    }

    function connectAdminWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}?role=admin`);
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'admin_update') {
            updateActiveRooms(msg.rooms);
          }
        } catch {}
      };
      ws.onclose = () => { setTimeout(connectAdminWS, 3000); };
    }

    // --- タブ ---
    function switchTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel' + capitalize(el.dataset.panel)).classList.add('active');
    }
    function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    // --- ダッシュボード ---
    async function loadStats() {
      try {
        const stats = await apiJSON('GET', '/api/stats');
        document.getElementById('statRooms').textContent = stats.activeRooms;
        document.getElementById('statHosts').textContent = stats.totalHosts;
        document.getElementById('statListeners').textContent = stats.totalListeners;
        document.getElementById('statMemory').textContent = Math.round(stats.memory.rss / 1024 / 1024);
        document.getElementById('statUptime').textContent = formatUptime(stats.uptime);
        document.getElementById('headerStats').textContent =
          `接続: ${stats.totalConnections} | メモリ: ${Math.round(stats.memory.rss / 1024 / 1024)}MB`;
      } catch {}
    }

    function formatUptime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function updateActiveRooms(roomsData) {
      allRooms = roomsData;
      const container = document.getElementById('activeRoomList');
      const active = roomsData.filter(r => r.live_host_connected || r.live_listeners > 0);
      if (active.length === 0) {
        container.innerHTML = '<div class="empty-msg">アクティブなルームはありません</div>';
        return;
      }
      container.innerHTML = active.map(r => roomCardHTML(r)).join('');
    }

    // --- ルーム管理 ---
    async function loadRooms() {
      const rooms = await apiJSON('GET', '/api/rooms');
      allRooms = rooms;
      renderRoomList(rooms);
    }

    function renderRoomList(rooms) {
      const container = document.getElementById('roomList');
      if (rooms.length === 0) {
        container.innerHTML = '<div class="empty-msg">ルームがありません。「新規ルーム作成」で作成してください。</div>';
        return;
      }
      container.innerHTML = rooms.map(r => roomCardHTML(r)).join('');
    }

    function roomCardHTML(r) {
      let badgeClass = 'active';
      let badgeText = '有効';
      if (!r.is_active) { badgeClass = 'inactive'; badgeText = '無効'; }
      else if (r.expires_at && new Date(r.expires_at) < new Date()) { badgeClass = 'expired'; badgeText = '期限切れ'; }
      else if (r.starts_at && new Date(r.starts_at) > new Date()) { badgeClass = 'inactive'; badgeText = '開始前'; }

      const expires = r.expires_at ? formatDT(r.expires_at) : '制限なし';
      return `
        <div class="bg-surface-card rounded-xl p-4 cursor-pointer border-2 border-transparent hover:border-slate-600 transition-all" onclick="openDetail('${escapeAttr(r.id)}')">
          <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-base">${esc(r.name)}</span>
            <span class="badge ${badgeClass}">${badgeText}</span>
          </div>
          <div class="text-xs text-slate-500 mb-1">ID: ${esc(r.id)}</div>
          <div class="flex gap-3 text-xs text-slate-400">
            <span>${r.live_host_connected ? '🎙️ 配信中' : '⏸️ 待機'}</span>
            <span>👥 ${r.live_listeners || 0}人</span>
            <span>〜${expires}</span>
          </div>
        </div>`;
    }

    // --- ルーム作成 ---
    function showCreateRoom() {
      document.getElementById('modalTitle').textContent = '新規ルーム作成';
      document.getElementById('modalMode').value = 'create';
      document.getElementById('formRoomId').value = '';
      document.getElementById('formRoomId').disabled = false;
      document.getElementById('formRoomName').value = '';
      document.getElementById('formRoomDesc').value = '';
      document.getElementById('formStartsAt').value = '';
      document.getElementById('formExpiresAt').value = '';
      document.getElementById('roomModal').classList.remove('hidden');
    }

    function showEditRoom(room) {
      document.getElementById('modalTitle').textContent = 'ルーム編集';
      document.getElementById('modalMode').value = 'edit';
      document.getElementById('formRoomId').value = room.id;
      document.getElementById('formRoomId').disabled = true;
      document.getElementById('formRoomName').value = room.name;
      document.getElementById('formRoomDesc').value = room.description || '';
      document.getElementById('formStartsAt').value = room.starts_at ? room.starts_at.slice(0, 16) : '';
      document.getElementById('formExpiresAt').value = room.expires_at ? room.expires_at.slice(0, 16) : '';
      document.getElementById('roomModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('roomModal').classList.add('hidden');
    }

    async function saveRoom() {
      const mode = document.getElementById('modalMode').value;
      const id = document.getElementById('formRoomId').value.trim();
      const name = document.getElementById('formRoomName').value.trim();
      if (!id || !name) { alert('ルームIDとルーム名は必須です'); return; }

      const body = {
        id,
        name,
        description: document.getElementById('formRoomDesc').value.trim(),
        starts_at: document.getElementById('formStartsAt').value || null,
        expires_at: document.getElementById('formExpiresAt').value || null,
      };

      if (mode === 'create') {
        const res = await api('POST', '/api/rooms', body);
        if (!res.ok) {
          const err = await res.json();
          alert(err.error || 'エラーが発生しました');
          return;
        }
      } else {
        await api('PUT', `/api/rooms/${encodeURIComponent(id)}`, body);
      }

      closeModal();
      await loadRooms();
      if (currentDetailRoom === id) openDetail(id);
    }

    async function deleteRoom(id) {
      if (!confirm(`ルーム「${id}」を削除しますか？\n文字おこし履歴・接続ログも全て削除されます。`)) return;
      await api('DELETE', `/api/rooms/${encodeURIComponent(id)}`);
      closeDetail();
      await loadRooms();
    }

    async function toggleRoom(id, currentActive) {
      await api('PUT', `/api/rooms/${encodeURIComponent(id)}`, { is_active: !currentActive });
      await loadRooms();
      openDetail(id);
    }

    // --- ルーム詳細 ---
    async function openDetail(roomId) {
      currentDetailRoom = roomId;
      const tabDetail = document.getElementById('tabDetail');
      tabDetail.style.display = 'block';
      tabDetail.click();

      const room = allRooms.find(r => r.id === roomId);
      if (!room) return;

      const baseUrl = `${location.protocol}//${location.host}`;
      const hostUrl = `${baseUrl}/host.html?room=${encodeURIComponent(roomId)}`;
      const listenUrl = `${baseUrl}/listen.html?room=${encodeURIComponent(roomId)}`;

      let html = `
        <h2 style="margin-bottom: 16px;">${esc(room.name)}</h2>

        <div class="bg-surface-card rounded-xl p-4 mb-4 border border-slate-700/50">
          <h3 class="text-sm font-semibold mb-3 text-accent-blue">ルーム情報</h3>
          <table class="data-table">
            <tr><th style="width:120px">ID</th><td>${esc(room.id)}</td></tr>
            <tr><th>説明</th><td>${esc(room.description || '-')}</td></tr>
            <tr><th>開始日時</th><td>${room.starts_at ? formatDT(room.starts_at) : '制限なし'}</td></tr>
            <tr><th>終了日時</th><td>${room.expires_at ? formatDT(room.expires_at) : '制限なし'}</td></tr>
            <tr><th>状態</th><td>${room.is_active ? '✅ 有効' : '⛔ 無効'}</td></tr>
            <tr><th>作成日</th><td>${room.created_at ? formatDT(room.created_at) : '-'}</td></tr>
          </table>
          <div class="btn-group">
            <button class="btn btn-secondary btn-sm" onclick='showEditRoom(${JSON.stringify(room)})'>編集</button>
            <button class="btn btn-sm ${room.is_active ? 'btn-secondary' : 'btn-success'}" onclick="toggleRoom('${escapeAttr(room.id)}', ${room.is_active})">${room.is_active ? '無効にする' : '有効にする'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRoom('${escapeAttr(room.id)}')">削除</button>
          </div>
        </div>

        <div class="bg-surface-card rounded-xl p-4 mb-4 border border-slate-700/50">
          <h3 class="text-sm font-semibold mb-3 text-accent-blue">QRコード</h3>
          <div class="qr-container">
            <div class="qr-item">
              <h4>説明者用</h4>
              <img id="qrHostImg" width="180" height="180" alt="QR">
              <div class="qr-buttons">
                <button onclick="copyQRImage('qrHostImg')">QR画像コピー</button>
                <button onclick="copyText('${esc(hostUrl)}', this)">URLコピー</button>
              </div>
              <div class="qr-url">${esc(hostUrl)}</div>
            </div>
            <div class="qr-item">
              <h4>聴講者用</h4>
              <img id="qrListenImg" width="180" height="180" alt="QR">
              <div class="qr-buttons">
                <button onclick="copyQRImage('qrListenImg')">QR画像コピー</button>
                <button onclick="copyText('${esc(listenUrl)}', this)">URLコピー</button>
              </div>
              <div class="qr-url">${esc(listenUrl)}</div>
            </div>
          </div>
        </div>

        <div class="bg-surface-card rounded-xl p-4 mb-4 border border-slate-700/50">
          <h3 class="text-sm font-semibold mb-3 text-accent-blue">接続ログ</h3>
          <div id="logTable"></div>
        </div>

        <div class="bg-surface-card rounded-xl p-4 mb-4 border border-slate-700/50">
          <h3 class="text-sm font-semibold mb-3 text-accent-blue">文字おこし履歴</h3>
          <div id="transcriptTable"></div>
        </div>`;

      document.getElementById('detailContent').innerHTML = html;

      // QRコード生成
      document.getElementById('qrHostImg').src = generateQRDataURL(hostUrl, '#e94560');
      document.getElementById('qrListenImg').src = generateQRDataURL(listenUrl, '#0f3460');

      // ログ・文字おこし読み込み
      loadLogs(roomId);
      loadTranscripts(roomId);
    }

    async function loadLogs(roomId, offset = 0) {
      const data = await apiJSON('GET', `/api/rooms/${encodeURIComponent(roomId)}/logs?limit=50&offset=${offset}`);
      const container = document.getElementById('logTable');
      if (data.rows.length === 0) {
        container.innerHTML = '<div class="empty-msg">接続ログはまだありません</div>';
        return;
      }
      let html = `<table class="data-table">
        <tr><th>日時</th><th>名前</th><th>役割</th><th>操作</th></tr>`;
      for (const row of data.rows) {
        const action = row.action === 'connect' ? '🟢 接続' : '🔴 切断';
        const role = row.role === 'host' ? '説明者' : '聴講者';
        html += `<tr><td>${formatDT(row.created_at)}</td><td>${esc(row.user_name)}</td><td>${role}</td><td>${action}</td></tr>`;
      }
      html += '</table>';
      if (data.total > 50) {
        html += `<div class="pagination">`;
        if (offset > 0) html += `<button class="btn btn-sm btn-secondary" onclick="loadLogs('${escapeAttr(roomId)}', ${offset - 50})">前へ</button>`;
        html += `<span style="color:#aaa;padding:6px">${offset + 1}〜${Math.min(offset + 50, data.total)} / ${data.total}件</span>`;
        if (offset + 50 < data.total) html += `<button class="btn btn-sm btn-secondary" onclick="loadLogs('${escapeAttr(roomId)}', ${offset + 50})">次へ</button>`;
        html += '</div>';
      }
      container.innerHTML = html;
    }

    async function loadTranscripts(roomId, offset = 0) {
      const data = await apiJSON('GET', `/api/rooms/${encodeURIComponent(roomId)}/transcriptions?limit=50&offset=${offset}`);
      const container = document.getElementById('transcriptTable');
      if (data.rows.length === 0) {
        container.innerHTML = '<div class="empty-msg">文字おこし履歴はまだありません</div>';
        return;
      }
      let html = `<table class="data-table">
        <tr><th>日時</th><th>話者</th><th>内容</th></tr>`;
      for (const row of data.rows) {
        html += `<tr><td style="white-space:nowrap">${formatDT(row.created_at)}</td><td style="white-space:nowrap">${esc(row.speaker_name)}</td><td>${esc(row.text)}</td></tr>`;
      }
      html += '</table>';
      if (data.total > 50) {
        html += `<div class="pagination">`;
        if (offset > 0) html += `<button class="btn btn-sm btn-secondary" onclick="loadTranscripts('${escapeAttr(roomId)}', ${offset - 50})">前へ</button>`;
        html += `<span style="color:#aaa;padding:6px">${offset + 1}〜${Math.min(offset + 50, data.total)} / ${data.total}件</span>`;
        if (offset + 50 < data.total) html += `<button class="btn btn-sm btn-secondary" onclick="loadTranscripts('${escapeAttr(roomId)}', ${offset + 50})">次へ</button>`;
        html += '</div>';
      }
      container.innerHTML = html;
    }

    function closeDetail() {
      currentDetailRoom = null;
      document.getElementById('tabDetail').style.display = 'none';
      document.querySelector('[data-panel="rooms"]').click();
    }

    // --- ユーティリティ ---
    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }
    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
    function formatDT(str) {
      if (!str) return '-';
      const d = new Date(str);
      if (isNaN(d)) return str;
      return d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    // --- クリップボードコピー ---
    async function copyText(text, btn) {
      try {
        await navigator.clipboard.writeText(text);
        const orig = btn.textContent;
        btn.textContent = 'コピー済み!';
        btn.classList.add('copy-ok');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copy-ok'); }, 2000);
      } catch { alert('コピーに失敗しました'); }
    }

    async function copyQRImage(imgId) {
      const img = document.getElementById(imgId);
      if (!img || !img.src) return;
      try {
        const res = await fetch(img.src);
        const blob = await res.blob();
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        const btn = img.closest('.qr-item').querySelector('.qr-buttons button');
        const orig = btn.textContent;
        btn.textContent = 'コピー済み!';
        btn.classList.add('copy-ok');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copy-ok'); }, 2000);
      } catch { alert('画像コピーに失敗しました（ブラウザが非対応の場合があります）'); }
    }
  </script>
</body>
</html>
