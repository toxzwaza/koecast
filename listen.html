<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音声受信 - 聴講者</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      font-size: 1.4em;
      margin-bottom: 8px;
      color: #0f3460;
    }
    .room-info {
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 20px;
    }
    .status-card {
      background: #16213e;
      border-radius: 16px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 20px;
    }
    .icon { font-size: 3em; margin-bottom: 16px; }
    .status-text { font-size: 1.2em; margin-bottom: 8px; font-weight: bold; }
    .status-sub { font-size: 0.9em; color: #aaa; }
    .status-waiting .status-text { color: #ffc107; }
    .status-receiving .status-text { color: #4caf50; }
    .status-broadcasting .status-text { color: #e94560; }
    .status-disconnected .status-text { color: #f44336; }

    .sound-wave {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 40px;
      margin: 16px 0;
    }
    .sound-wave .bar {
      width: 4px;
      background: #4caf50;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }
    .sound-wave .bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .sound-wave .bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .sound-wave .bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
    .sound-wave .bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
    .sound-wave .bar:nth-child(5) { height: 10px; animation-delay: 0.4s; }
    .sound-wave.hidden { display: none; }

    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(2); }
    }

    .listener-count { font-size: 0.9em; color: #aaa; margin-top: 8px; }

    /* ログイン画面 */
    .login-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      background: #16213e;
      border-radius: 20px;
      padding: 32px;
      width: 90%;
      max-width: 360px;
      text-align: center;
    }
    .login-card h2 {
      font-size: 1.3em;
      margin-bottom: 8px;
      color: #0f3460;
    }
    .login-card p {
      font-size: 0.9em;
      color: #aaa;
      margin-bottom: 20px;
    }
    .login-card input {
      width: 100%;
      padding: 14px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #0d1528;
      color: #eee;
      font-size: 1.1em;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
    }
    .login-card input:focus {
      border-color: #0f3460;
    }
    .login-card button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #0f3460;
      color: white;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
    }
    .login-card button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 音声有効化オーバーレイ */
    .tap-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .tap-overlay.hidden { display: none; }
    .tap-overlay .tap-icon { font-size: 4em; margin-bottom: 20px; }
    .tap-overlay .tap-text {
      font-size: 1.3em;
      font-weight: bold;
      color: white;
      margin-bottom: 8px;
    }
    .tap-overlay .tap-sub { font-size: 0.9em; color: #aaa; }

    .volume-control {
      width: 100%;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }
    .volume-control label { font-size: 1.2em; }
    .volume-control input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: #333;
      border-radius: 3px;
      outline: none;
    }
    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #0f3460;
      border-radius: 50%;
      cursor: pointer;
    }

    /* 挙手ボタン */
    .hand-raise-area {
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
    }
    .btn-hand {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-hand.idle {
      background: #ffc107;
      color: #333;
    }
    .btn-hand.raised {
      background: #e94560;
      color: white;
      animation: pulseHand 1.5s infinite;
    }
    @keyframes pulseHand {
      0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.5); }
      50% { box-shadow: 0 0 0 12px rgba(233, 69, 96, 0); }
    }

    /* 発言中モード */
    .speaking-mode {
      background: #4caf50;
      color: white;
      border-radius: 12px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      animation: speakPulse 2s infinite;
    }
    @keyframes speakPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.5); }
      50% { box-shadow: 0 0 0 12px rgba(76, 175, 80, 0); }
    }
    .speaking-mode .mic-icon { font-size: 2em; }
    .speaking-mode .speaking-text { font-size: 1.1em; font-weight: bold; margin-top: 8px; }

    /* 他の人が発言中 */
    .other-speaking {
      background: #16213e;
      border: 2px solid #4caf50;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
      font-size: 0.95em;
    }

    /* 文字おこしパネル */
    .transcript-panel {
      background: #16213e;
      border-radius: 16px;
      padding: 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
    }
    .transcript-panel h2 {
      font-size: 1em;
      margin-bottom: 12px;
      color: #53c0f0;
    }
    .transcript-box {
      background: #0d1528;
      border-radius: 10px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.9em;
      line-height: 1.6;
    }
    .transcript-line { margin-bottom: 4px; }
    .transcript-line .speaker { color: #e94560; font-weight: bold; }
    .transcript-line .text { color: #ddd; }
    .transcript-line .interim { color: #888; font-style: italic; }
    .transcript-empty { color: #666; text-align: center; }

    .connection-status {
      font-size: 0.85em;
      color: #aaa;
      margin-top: 12px;
    }
    .connection-status.connected { color: #4caf50; }
    .connection-status.disconnected { color: #f44336; }

    .user-name-display {
      font-size: 0.9em;
      color: #53c0f0;
      margin-bottom: 12px;
    }

    /* ガイドツアー */
    .tour-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
    }
    .tour-overlay.hidden { display: none; }
    .tour-spotlight {
      position: absolute;
      border: 3px solid #53c0f0;
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.7);
      transition: all 0.4s ease;
      pointer-events: none;
    }
    .tour-card {
      position: absolute;
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      width: 85%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 301;
    }
    .tour-card .tour-step { font-size: 0.75em; color: #666; margin-bottom: 8px; }
    .tour-card .tour-title { font-size: 1.1em; font-weight: bold; color: #53c0f0; margin-bottom: 8px; }
    .tour-card .tour-desc { font-size: 0.9em; color: #ccc; margin-bottom: 16px; line-height: 1.5; }
    .tour-card button {
      padding: 10px 24px; border: none; border-radius: 10px;
      font-size: 0.95em; font-weight: bold; cursor: pointer;
      background: #53c0f0; color: #1a1a2e;
    }
    .tour-card .tour-skip {
      background: none; color: #666; font-size: 0.8em;
      margin-top: 8px; padding: 4px;
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h2>工場見学</h2>
      <p>お名前を入力して参加してください</p>
      <input type="text" id="nameInput" placeholder="お名前" maxlength="20" autocomplete="off">
      <button id="btnJoin" onclick="joinWithName()" disabled>参加する</button>
    </div>
  </div>

  <!-- 音声有効化オーバーレイ -->
  <div class="tap-overlay hidden" id="tapOverlay" onclick="unlockAudio()">
    <div class="tap-icon">🔊</div>
    <div class="tap-text">画面をタップして音声を有効化</div>
    <div class="tap-sub">音声を再生するにはタップが必要です</div>
  </div>

  <h1>音声受信（聴講者）</h1>
  <div class="user-name-display" id="userNameDisplay"></div>
  <div class="room-info" id="roomInfo">ルーム: -</div>

  <div class="status-card status-waiting" id="statusCard">
    <div class="icon" id="statusIcon">🔇</div>
    <div class="status-text" id="statusText">待機中</div>
    <div class="status-sub" id="statusSub">説明者の配信を待っています...</div>
    <div class="sound-wave hidden" id="soundWave">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div class="listener-count" id="listenerInfo"></div>
  </div>

  <!-- 発言中モード（自分） -->
  <div class="speaking-mode" id="speakingMode">
    <div class="mic-icon">🎤</div>
    <div class="speaking-text">発言中です（全員に聞こえています）</div>
  </div>

  <!-- 他の人が発言中 -->
  <div class="other-speaking" id="otherSpeaking">
    🎤 <span id="otherSpeakerName"></span> が発言中
  </div>

  <!-- 挙手ボタン -->
  <div class="hand-raise-area" id="handRaiseArea">
    <button class="btn-hand idle" id="btnHand" onclick="toggleHandRaise()">
      ✋ 挙手する
    </button>
  </div>

  <div class="volume-control">
    <label>🔊</label>
    <input type="range" id="volume" min="0" max="100" value="80" oninput="setVolume(this.value)">
  </div>

  <!-- 文字おこしパネル -->
  <div class="transcript-panel">
    <h2>📝 文字おこし</h2>
    <div class="transcript-box" id="transcriptBox">
      <div class="transcript-empty" id="transcriptEmpty">音声受信後に表示されます</div>
    </div>
  </div>

  <div class="connection-status disconnected" id="connStatus">サーバー未接続</div>

  <!-- ガイドツアー -->
  <div class="tour-overlay hidden" id="tourOverlay">
    <div class="tour-spotlight" id="tourSpotlight"></div>
    <div class="tour-card" id="tourCard">
      <div class="tour-step" id="tourStep"></div>
      <div class="tour-title" id="tourTitle"></div>
      <div class="tour-desc" id="tourDesc"></div>
      <button id="tourNext" onclick="tourNext()">次へ</button><br>
      <button class="tour-skip" onclick="tourFinish()">スキップ</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const roomId = params.get('room') || 'default';
    document.getElementById('roomInfo').textContent = `ルーム: ${roomId}`;

    const SAMPLE_RATE = 16000;
    const BUFFER_SIZE = 2048;
    const MAX_PLAYBACK_DELAY = 0.3; // 再生遅延の上限（秒）

    let userName = '';
    let ws = null;
    let audioContext = null;
    let gainNode = null;
    let isAudioUnlocked = false;
    let isReceiving = false;
    let nextPlayTime = 0;
    let isHandRaised = false;
    let isSpeaking = false;

    // 発言用
    let speakStream = null;
    let speakAudioContext = null;
    let speakProcessor = null;
    let speakSource = null;
    let speakRecognition = null;
    let speakSilentGain = null;

    // --- ログイン ---
    const nameInput = document.getElementById('nameInput');
    nameInput.addEventListener('input', () => {
      document.getElementById('btnJoin').disabled = nameInput.value.trim().length === 0;
    });
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && nameInput.value.trim().length > 0) {
        joinWithName();
      }
    });

    function joinWithName() {
      userName = nameInput.value.trim();
      if (!userName) return;

      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('userNameDisplay').textContent = `参加名: ${userName}`;

      // 音声有効化オーバーレイを表示
      document.getElementById('tapOverlay').classList.remove('hidden');
    }

    // --- 音声有効化 ---
    function unlockAudio() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: SAMPLE_RATE,
      });
      gainNode = audioContext.createGain();
      gainNode.connect(audioContext.destination);
      setVolume(document.getElementById('volume').value);

      const silent = audioContext.createBuffer(1, 1, SAMPLE_RATE);
      const src = audioContext.createBufferSource();
      src.buffer = silent;
      src.connect(audioContext.destination);
      src.start();

      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }

      isAudioUnlocked = true;
      nextPlayTime = 0;
      document.getElementById('tapOverlay').classList.add('hidden');

      if (!ws) connect();

      // 初回ガイドツアー（接続後少し待ってから開始）
      setTimeout(startTour, 1500);
    }

    function setVolume(val) {
      if (gainNode) {
        gainNode.gain.value = val / 100;
      }
    }

    function playPCMChunk(int16ArrayBuffer) {
      if (!audioContext || audioContext.state === 'suspended') return;

      const int16 = new Int16Array(int16ArrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7FFF);
      }

      const audioBuffer = audioContext.createBuffer(1, float32.length, SAMPLE_RATE);
      audioBuffer.getChannelData(0).set(float32);

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(gainNode);

      const now = audioContext.currentTime;
      // 自分が発言中は再生しない（エコー防止）
      if (isSpeaking) return;
      if (nextPlayTime < now) {
        nextPlayTime = now + 0.005;
      }
      // 遅延が大きくなりすぎたらリセット
      if (nextPlayTime - now > MAX_PLAYBACK_DELAY) {
        nextPlayTime = now + 0.005;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    // --- 状態表示 ---
    function setStatus(state, text, sub) {
      const card = document.getElementById('statusCard');
      const icon = document.getElementById('statusIcon');
      const wave = document.getElementById('soundWave');

      card.className = `status-card status-${state}`;
      document.getElementById('statusText').textContent = text;
      document.getElementById('statusSub').textContent = sub;

      if (state === 'broadcasting') {
        icon.textContent = '🎙️';
        wave.classList.remove('hidden');
      } else if (state === 'receiving') {
        icon.textContent = '🔊';
        wave.classList.remove('hidden');
      } else if (state === 'waiting') {
        icon.textContent = '🔇';
        wave.classList.add('hidden');
      } else {
        icon.textContent = '❌';
        wave.classList.add('hidden');
      }
    }

    // --- 挙手 ---
    function toggleHandRaise() {
      if (isSpeaking) return;

      const btn = document.getElementById('btnHand');
      isHandRaised = !isHandRaised;

      if (isHandRaised) {
        btn.className = 'btn-hand raised';
        btn.textContent = '✋ 挙手中（タップで取り消し）';
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'hand_raise' }));
        }
      } else {
        btn.className = 'btn-hand idle';
        btn.textContent = '✋ 挙手する';
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'hand_lower' }));
        }
      }
    }

    // --- 発言モード ---
    async function startSpeaking() {
      isSpeaking = true;
      isHandRaised = false;

      const btn = document.getElementById('btnHand');
      btn.className = 'btn-hand idle';
      btn.textContent = '✋ 挙手する';
      btn.style.display = 'none';

      document.getElementById('speakingMode').style.display = 'block';

      // ステータスを「配信中」に変更
      setStatus('broadcasting', '配信中', 'あなたの音声が全員に配信されています');

      try {
        speakStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: SAMPLE_RATE,
          }
        });

        speakAudioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: SAMPLE_RATE,
        });

        speakSource = speakAudioContext.createMediaStreamSource(speakStream);
        speakProcessor = speakAudioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);

        speakProcessor.onaudioprocess = (e) => {
          if (!isSpeaking || !ws || ws.readyState !== WebSocket.OPEN) return;

          const float32 = e.inputBuffer.getChannelData(0);
          const int16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          ws.send(int16.buffer);
        };

        speakSource.connect(speakProcessor);
        // 自分の声がスピーカーから出ないよう無音ゲインを経由
        speakSilentGain = speakAudioContext.createGain();
        speakSilentGain.gain.value = 0;
        speakProcessor.connect(speakSilentGain);
        speakSilentGain.connect(speakAudioContext.destination);

        // 文字おこし開始
        startSpeakRecognition();

      } catch (err) {
        console.error('マイク取得エラー:', err);
        stopSpeaking();
      }
    }

    function stopSpeaking() {
      isSpeaking = false;

      stopSpeakRecognition();

      if (speakProcessor) { speakProcessor.disconnect(); speakProcessor = null; }
      if (speakSilentGain) { speakSilentGain.disconnect(); speakSilentGain = null; }
      if (speakSource) { speakSource.disconnect(); speakSource = null; }
      if (speakAudioContext) { speakAudioContext.close(); speakAudioContext = null; }
      if (speakStream) { speakStream.getTracks().forEach(t => t.stop()); speakStream = null; }

      document.getElementById('speakingMode').style.display = 'none';
      document.getElementById('btnHand').style.display = 'block';

      // ステータスを「受信中」に戻す（配信中なら）
      if (isReceiving) {
        setStatus('receiving', '受信中', '音声を再生しています');
      }
      // 再生バッファをリセット
      nextPlayTime = 0;
    }

    // --- 聴講者の文字おこし（発言中のみ） ---
    function startSpeakRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;

      speakRecognition = new SpeechRecognition();
      speakRecognition.lang = 'ja-JP';
      speakRecognition.continuous = true;
      speakRecognition.interimResults = true;

      speakRecognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const text = result[0].transcript;
          const isFinal = result.isFinal;

          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'transcription', text, isFinal }));
          }
        }
      };

      speakRecognition.onend = () => {
        if (isSpeaking) speakRecognition.start();
      };

      speakRecognition.onerror = (event) => {
        if (event.error === 'no-speech') return;
        if (isSpeaking && event.error !== 'aborted') {
          setTimeout(() => {
            if (isSpeaking) speakRecognition.start();
          }, 1000);
        }
      };

      speakRecognition.start();
    }

    function stopSpeakRecognition() {
      if (speakRecognition) {
        speakRecognition.abort();
        speakRecognition = null;
      }
    }

    // --- 文字おこし表示 ---
    let currentInterimLine = null;

    function showTranscription(speaker, text, isFinal) {
      const box = document.getElementById('transcriptBox');
      const empty = document.getElementById('transcriptEmpty');
      if (empty) empty.remove();

      if (isFinal) {
        if (currentInterimLine) {
          currentInterimLine.remove();
          currentInterimLine = null;
        }
        const div = document.createElement('div');
        div.className = 'transcript-line';
        div.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="text">${escapeHtml(text)}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      } else {
        if (!currentInterimLine) {
          currentInterimLine = document.createElement('div');
          currentInterimLine.className = 'transcript-line';
          box.appendChild(currentInterimLine);
        }
        currentInterimLine.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="interim">${escapeHtml(text)}</span>`;
        box.scrollTop = box.scrollHeight;
      }
    }

    // --- WebSocket接続 ---
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}?role=listener&room=${encodeURIComponent(roomId)}&name=${encodeURIComponent(userName)}`;

      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        document.getElementById('connStatus').textContent = 'サーバー接続済み';
        document.getElementById('connStatus').className = 'connection-status connected';
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          if (!isReceiving) {
            isReceiving = true;
            setStatus('receiving', '受信中', '音声を再生しています');
          }
          playPCMChunk(event.data);
        } else {
          try {
            const msg = JSON.parse(event.data);
            switch (msg.type) {
              case 'broadcast_started':
                isReceiving = true;
                nextPlayTime = 0;
                setStatus('receiving', '受信中', '音声を再生しています');
                break;
              case 'broadcast_stopped':
                isReceiving = false;
                nextPlayTime = 0;
                setStatus('waiting', '待機中', '説明者が配信を停止しました');
                break;
              case 'host_connected':
                setStatus('waiting', '待機中', '説明者が接続しました。配信開始を待っています...');
                break;
              case 'host_disconnected':
                isReceiving = false;
                nextPlayTime = 0;
                setStatus('disconnected', '切断', '説明者が切断しました');
                break;
              case 'listener_count':
                document.getElementById('listenerInfo').textContent =
                  `現在 ${msg.count} 人が接続中`;
                break;
              case 'speak_allowed':
                startSpeaking();
                break;
              case 'speak_revoked':
                stopSpeaking();
                break;
              case 'speaker_changed':
                if (msg.name && msg.name !== userName) {
                  document.getElementById('otherSpeakerName').textContent = msg.name;
                  document.getElementById('otherSpeaking').style.display = 'block';
                } else {
                  document.getElementById('otherSpeaking').style.display = 'none';
                }
                if (!msg.name && isSpeaking) {
                  stopSpeaking();
                }
                break;
              case 'transcription':
                showTranscription(msg.name, msg.text, msg.isFinal);
                break;
              case 'room_info':
                document.getElementById('roomInfo').textContent = `ルーム: ${msg.name}`;
                break;
              case 'error':
                alert(msg.message);
                break;
            }
          } catch (e) {}
        }
      };

      ws.onclose = () => {
        document.getElementById('connStatus').textContent = 'サーバー切断 - 再接続中...';
        document.getElementById('connStatus').className = 'connection-status disconnected';
        isReceiving = false;
        ws = null;
        setTimeout(() => {
          if (isAudioUnlocked) connect();
        }, 3000);
      };

      ws.onerror = () => {};
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- ガイドツアー ---
    const tourSteps = [
      {
        target: '#statusCard',
        title: '音声受信エリア',
        desc: '説明者が配信を開始すると、ここに状態が表示され、音声が自動的に再生されます。',
      },
      {
        target: '.volume-control',
        title: '音量調整',
        desc: 'スライダーで音量を調整できます。聞こえにくい場合はここを操作してください。',
      },
      {
        target: '#handRaiseArea',
        title: '挙手ボタン',
        desc: '質問したいときはこのボタンを押してください。説明者が発言を許可すると、マイクが有効になります。',
      },
      {
        target: '.transcript-panel',
        title: '文字おこし',
        desc: '説明者や発言者の話した内容がリアルタイムで文字に変換されて表示されます。',
      },
    ];
    let tourIndex = 0;

    function startTour() {
      if (localStorage.getItem('koecast_tour_done')) return;
      tourIndex = 0;
      document.getElementById('tourOverlay').classList.remove('hidden');
      showTourStep();
    }

    function showTourStep() {
      const step = tourSteps[tourIndex];
      const el = document.querySelector(step.target);
      if (!el) { tourNext(); return; }

      const rect = el.getBoundingClientRect();
      const spotlight = document.getElementById('tourSpotlight');
      const pad = 8;
      spotlight.style.top = (rect.top - pad) + 'px';
      spotlight.style.left = (rect.left - pad) + 'px';
      spotlight.style.width = (rect.width + pad * 2) + 'px';
      spotlight.style.height = (rect.height + pad * 2) + 'px';

      document.getElementById('tourStep').textContent = `${tourIndex + 1} / ${tourSteps.length}`;
      document.getElementById('tourTitle').textContent = step.title;
      document.getElementById('tourDesc').textContent = step.desc;

      const card = document.getElementById('tourCard');
      const isLast = tourIndex === tourSteps.length - 1;
      document.getElementById('tourNext').textContent = isLast ? '完了' : '次へ';

      // カード位置をターゲットの下に配置
      const cardTop = rect.bottom + 16;
      if (cardTop + 200 > window.innerHeight) {
        card.style.top = 'auto';
        card.style.bottom = (window.innerHeight - rect.top + 16) + 'px';
      } else {
        card.style.top = cardTop + 'px';
        card.style.bottom = 'auto';
      }
      card.style.left = '50%';
      card.style.transform = 'translateX(-50%)';
    }

    function tourNext() {
      tourIndex++;
      if (tourIndex >= tourSteps.length) {
        tourFinish();
      } else {
        showTourStep();
      }
    }

    function tourFinish() {
      localStorage.setItem('koecast_tour_done', '1');
      document.getElementById('tourOverlay').classList.add('hidden');
    }
  </script>
</body>
</html>
