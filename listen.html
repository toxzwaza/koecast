<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoeCast - 聴講者</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
            surface: { DEFAULT: '#0f172a', card: '#1e293b', input: '#0f172a' },
            accent: { red: '#ef4444', green: '#22c55e', yellow: '#eab308', blue: '#38bdf8' },
          }
        }
      }
    }
  </script>
  <style>
    /* JS が className で直接セットするクラス用 */
    .status-card { transition: all 0.3s ease; }
    .status-waiting .status-text-color { color: #eab308; }
    .status-receiving .status-text-color { color: #22c55e; }
    .status-broadcasting .status-text-color { color: #ef4444; }
    .status-disconnected .status-text-color { color: #ef4444; }

    .btn-hand { transition: all 0.2s ease; }
    .btn-hand.idle {
      background: linear-gradient(135deg, #eab308, #f59e0b);
      color: #1e293b; box-shadow: 0 4px 14px rgba(234, 179, 8, 0.3);
    }
    .btn-hand.raised {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white; animation: pulseHand 1.5s infinite;
    }

    .connection-status.connected { color: #22c55e; }
    .connection-status.disconnected { color: #ef4444; }

    .transcript-line { margin-bottom: 6px; }
    .transcript-line .speaker { color: #818cf8; font-weight: 600; }
    .transcript-line .text { color: #cbd5e1; }
    .transcript-line .interim { color: #64748b; font-style: italic; }

    /* アニメーション */
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(2.2); }
    }
    @keyframes pulseHand {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 0 0 14px rgba(239, 68, 68, 0); }
    }
    @keyframes speakPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { box-shadow: 0 0 0 14px rgba(34, 197, 94, 0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .sound-wave .bar {
      animation: wave 1s ease-in-out infinite;
    }
    .sound-wave .bar:nth-child(1) { height: 10px; animation-delay: 0s; }
    .sound-wave .bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
    .sound-wave .bar:nth-child(3) { height: 30px; animation-delay: 0.2s; }
    .sound-wave .bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
    .sound-wave .bar:nth-child(5) { height: 10px; animation-delay: 0.4s; }

    .speaking-mode { animation: speakPulse 2s infinite; }

    /* スライダー */
    input[type="range"] { -webkit-appearance: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 50%; cursor: pointer;
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
    }

    /* スクロールバー */
    .transcript-box::-webkit-scrollbar { width: 4px; }
    .transcript-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    /* ガイドツアー */
    .tour-spotlight {
      position: absolute;
      border: 3px solid #38bdf8;
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.75);
      transition: all 0.4s ease;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center p-5 font-sans text-slate-200">

  <!-- ログイン画面 -->
  <div class="login-overlay fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[200]" id="loginOverlay">
    <div class="bg-surface-card rounded-3xl p-8 w-[90%] max-w-[360px] text-center shadow-2xl border border-slate-700/50">
      <div class="text-4xl mb-4" style="animation: float 3s ease-in-out infinite">🎧</div>
      <h2 class="text-xl font-bold mb-2 text-brand-light">KoeCast</h2>
      <p class="text-sm text-slate-400 mb-6">お名前を入力して参加してください</p>
      <input type="text" id="nameInput" placeholder="お名前"  maxlength="20" autocomplete="off"
        class="w-full p-4 border-2 border-slate-600 rounded-xl bg-surface text-slate-200 text-lg text-center outline-none focus:border-brand mb-4 placeholder-slate-500">
      <button id="btnJoin" onclick="joinWithName()" disabled
        class="w-full p-4 border-none rounded-xl bg-gradient-to-r from-brand to-brand-light text-white text-lg font-bold cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed hover:shadow-lg hover:shadow-brand/30 transition-all">
        参加する
      </button>
    </div>
  </div>

  <!-- 音声有効化オーバーレイ -->
  <div class="tap-overlay fixed inset-0 bg-black/90 hidden flex-col items-center justify-center z-[100] cursor-pointer" id="tapOverlay" onclick="unlockAudio()"
    style="display:none">
    <div class="text-6xl mb-5" style="animation: float 2s ease-in-out infinite">🔊</div>
    <div class="text-xl font-bold text-white mb-2">タップして音声を有効化</div>
    <div class="text-sm text-slate-400">音声を再生するにはタップが必要です</div>
  </div>

  <!-- メインコンテンツ -->
  <div class="flex items-center gap-2 mb-1">
    <span class="text-2xl">🎧</span>
    <h1 class="text-xl font-bold text-brand-light">KoeCast</h1>
  </div>
  <div class="text-sm text-brand-light/70 mb-1" id="userNameDisplay"></div>
  <div class="text-xs text-slate-500 mb-5" id="roomInfo">ルーム: -</div>

  <!-- ステータスカード -->
  <div class="status-card status-waiting bg-surface-card rounded-2xl p-8 w-full max-w-[400px] text-center mb-5 border border-slate-700/50 shadow-xl" id="statusCard">
    <div class="text-5xl mb-4" id="statusIcon">🔇</div>
    <div class="status-text-color text-xl font-bold mb-2" id="statusText">待機中</div>
    <div class="text-sm text-slate-400" id="statusSub">説明者の配信を待っています...</div>
    <div class="sound-wave hidden flex items-center justify-center gap-1 h-10 my-4" id="soundWave">
      <div class="bar w-1 bg-accent-green rounded-sm"></div>
      <div class="bar w-1 bg-accent-green rounded-sm"></div>
      <div class="bar w-1 bg-accent-green rounded-sm"></div>
      <div class="bar w-1 bg-accent-green rounded-sm"></div>
      <div class="bar w-1 bg-accent-green rounded-sm"></div>
    </div>
    <div class="text-sm text-slate-400 mt-2" id="listenerInfo"></div>
  </div>

  <!-- 発言中モード（自分） -->
  <div class="speaking-mode bg-gradient-to-r from-green-600 to-emerald-500 text-white rounded-2xl p-5 w-full max-w-[400px] text-center mb-4 hidden" id="speakingMode" style="display:none">
    <div class="text-3xl">🎤</div>
    <div class="text-base font-bold mt-2">発言中です</div>
    <div class="text-sm opacity-80 mt-1">全員に聞こえています</div>
  </div>

  <!-- 他の人が発言中 -->
  <div class="other-speaking bg-surface-card border-2 border-accent-green rounded-2xl p-3 w-full max-w-[400px] text-center mb-4 text-sm" id="otherSpeaking" style="display:none">
    🎤 <span id="otherSpeakerName" class="font-bold text-accent-green"></span> が発言中
  </div>

  <!-- 挙手ボタン -->
  <div class="w-full max-w-[400px] mb-4" id="handRaiseArea">
    <button class="btn-hand idle w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer" id="btnHand" onclick="toggleHandRaise()">
      ✋ 挙手する
    </button>
  </div>

  <!-- 音量 -->
  <div class="w-full max-w-[400px] flex items-center gap-3 py-3 px-1">
    <label class="text-lg">🔊</label>
    <input type="range" id="volume" min="0" max="100" value="80" oninput="setVolume(this.value)"
      class="flex-1 h-1.5 bg-slate-700 rounded-full outline-none">
  </div>

  <!-- 文字おこしパネル -->
  <div class="transcript-panel bg-surface-card rounded-2xl p-4 w-full max-w-[400px] mb-5 border border-slate-700/50">
    <h2 class="text-sm font-semibold mb-3 text-accent-blue flex items-center gap-1.5">
      <span>📝</span> 文字おこし
    </h2>
    <div class="transcript-box bg-surface rounded-xl p-3 max-h-[200px] overflow-y-auto text-sm leading-relaxed" id="transcriptBox">
      <div class="transcript-empty text-slate-500 text-center" id="transcriptEmpty">音声受信後に表示されます</div>
    </div>
  </div>

  <div class="connection-status disconnected text-xs mt-3" id="connStatus">サーバー未接続</div>

  <!-- ガイドツアー -->
  <div class="tour-overlay fixed inset-0 bg-black/75 z-[300] hidden flex items-center justify-center" id="tourOverlay">
    <div class="tour-spotlight" id="tourSpotlight"></div>
    <div class="tour-card absolute bg-surface-card rounded-2xl p-5 w-[85%] max-w-[320px] text-center shadow-2xl border border-slate-700/50 z-[301]" id="tourCard">
      <div class="tour-step text-xs text-slate-500 mb-2" id="tourStep"></div>
      <div class="tour-title text-lg font-bold text-accent-blue mb-2" id="tourTitle"></div>
      <div class="tour-desc text-sm text-slate-300 mb-4 leading-relaxed" id="tourDesc"></div>
      <button id="tourNext" onclick="tourNext()"
        class="px-6 py-2.5 border-none rounded-xl text-sm font-bold cursor-pointer bg-gradient-to-r from-brand to-brand-light text-white hover:shadow-lg transition-all">次へ</button><br>
      <button class="tour-skip bg-transparent border-none text-slate-500 text-xs mt-2 p-1 cursor-pointer hover:text-slate-300" onclick="tourFinish()">スキップ</button>
    </div>
  </div>

  <script>
    // tapOverlayのhidden制御をJSで行うためCSS初期表示をdisplay:noneにする
    // joinWithName()でhiddenクラスを外す時にdisplay:flexに
    const _origJoin = null;

    const params = new URLSearchParams(location.search);
    const roomId = params.get('room') || 'default';
    document.getElementById('roomInfo').textContent = `ルーム: ${roomId}`;

    const SAMPLE_RATE = 16000;
    const BUFFER_SIZE = 2048;
    const MAX_PLAYBACK_DELAY = 0.3;

    let userName = '';
    let ws = null;
    let audioContext = null;
    let gainNode = null;
    let isAudioUnlocked = false;
    let isReceiving = false;
    let nextPlayTime = 0;
    let isHandRaised = false;
    let isSpeaking = false;

    let speakStream = null;
    let speakAudioContext = null;
    let speakProcessor = null;
    let speakSource = null;
    let speakRecognition = null;
    let speakSilentGain = null;

    // --- ログイン ---
    const nameInput = document.getElementById('nameInput');
    nameInput.addEventListener('input', () => {
      document.getElementById('btnJoin').disabled = nameInput.value.trim().length === 0;
    });
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && nameInput.value.trim().length > 0) {
        joinWithName();
      }
    });

    function joinWithName() {
      userName = nameInput.value.trim();
      if (!userName) return;

      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('userNameDisplay').textContent = `参加名: ${userName}`;

      const tap = document.getElementById('tapOverlay');
      tap.style.display = 'flex';
    }

    // --- 音声有効化 ---
    function unlockAudio() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: SAMPLE_RATE,
      });
      gainNode = audioContext.createGain();
      gainNode.connect(audioContext.destination);
      setVolume(document.getElementById('volume').value);

      const silent = audioContext.createBuffer(1, 1, SAMPLE_RATE);
      const src = audioContext.createBufferSource();
      src.buffer = silent;
      src.connect(audioContext.destination);
      src.start();

      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }

      isAudioUnlocked = true;
      nextPlayTime = 0;
      document.getElementById('tapOverlay').style.display = 'none';

      if (!ws) connect();

      setTimeout(startTour, 1500);
    }

    function setVolume(val) {
      if (gainNode) {
        gainNode.gain.value = val / 100;
      }
    }

    function playPCMChunk(int16ArrayBuffer) {
      if (!audioContext || audioContext.state === 'suspended') return;

      const int16 = new Int16Array(int16ArrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7FFF);
      }

      const audioBuffer = audioContext.createBuffer(1, float32.length, SAMPLE_RATE);
      audioBuffer.getChannelData(0).set(float32);

      const source = audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(gainNode);

      const now = audioContext.currentTime;
      if (isSpeaking) return;
      if (nextPlayTime < now) {
        nextPlayTime = now + 0.005;
      }
      if (nextPlayTime - now > MAX_PLAYBACK_DELAY) {
        nextPlayTime = now + 0.005;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    // --- 状態表示 ---
    function setStatus(state, text, sub) {
      const card = document.getElementById('statusCard');
      const icon = document.getElementById('statusIcon');
      const wave = document.getElementById('soundWave');

      card.className = `status-card status-${state} bg-surface-card rounded-2xl p-8 w-full max-w-[400px] text-center mb-5 border border-slate-700/50 shadow-xl`;
      document.getElementById('statusText').textContent = text;
      document.getElementById('statusSub').textContent = sub;

      if (state === 'broadcasting') {
        icon.textContent = '🎙️';
        wave.style.display = 'flex';
      } else if (state === 'receiving') {
        icon.textContent = '🔊';
        wave.style.display = 'flex';
      } else if (state === 'waiting') {
        icon.textContent = '🔇';
        wave.style.display = 'none';
      } else {
        icon.textContent = '❌';
        wave.style.display = 'none';
      }
    }

    // --- 挙手 ---
    function toggleHandRaise() {
      if (isSpeaking) return;

      const btn = document.getElementById('btnHand');
      isHandRaised = !isHandRaised;

      if (isHandRaised) {
        btn.className = 'btn-hand raised w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer';
        btn.textContent = '✋ 挙手中（タップで取り消し）';
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'hand_raise' }));
        }
      } else {
        btn.className = 'btn-hand idle w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer';
        btn.textContent = '✋ 挙手する';
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'hand_lower' }));
        }
      }
    }

    // --- 発言モード ---
    async function startSpeaking() {
      isSpeaking = true;
      isHandRaised = false;

      const btn = document.getElementById('btnHand');
      btn.className = 'btn-hand idle w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer';
      btn.textContent = '✋ 挙手する';
      btn.style.display = 'none';

      document.getElementById('speakingMode').style.display = 'block';

      setStatus('broadcasting', '配信中', 'あなたの音声が全員に配信されています');

      try {
        speakStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: SAMPLE_RATE,
          }
        });

        speakAudioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: SAMPLE_RATE,
        });

        speakSource = speakAudioContext.createMediaStreamSource(speakStream);
        speakProcessor = speakAudioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);

        speakProcessor.onaudioprocess = (e) => {
          if (!isSpeaking || !ws || ws.readyState !== WebSocket.OPEN) return;

          const float32 = e.inputBuffer.getChannelData(0);
          const int16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          ws.send(int16.buffer);
        };

        speakSource.connect(speakProcessor);
        speakSilentGain = speakAudioContext.createGain();
        speakSilentGain.gain.value = 0;
        speakProcessor.connect(speakSilentGain);
        speakSilentGain.connect(speakAudioContext.destination);

        startSpeakRecognition();

      } catch (err) {
        console.error('マイク取得エラー:', err);
        stopSpeaking();
      }
    }

    function stopSpeaking() {
      isSpeaking = false;

      stopSpeakRecognition();

      if (speakProcessor) { speakProcessor.disconnect(); speakProcessor = null; }
      if (speakSilentGain) { speakSilentGain.disconnect(); speakSilentGain = null; }
      if (speakSource) { speakSource.disconnect(); speakSource = null; }
      if (speakAudioContext) { speakAudioContext.close(); speakAudioContext = null; }
      if (speakStream) { speakStream.getTracks().forEach(t => t.stop()); speakStream = null; }

      document.getElementById('speakingMode').style.display = 'none';
      document.getElementById('btnHand').style.display = 'block';

      if (isReceiving) {
        setStatus('receiving', '受信中', '音声を再生しています');
      }
      nextPlayTime = 0;
    }

    // --- 聴講者の文字おこし（発言中のみ） ---
    function startSpeakRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) return;

      speakRecognition = new SpeechRecognition();
      speakRecognition.lang = 'ja-JP';
      speakRecognition.continuous = true;
      speakRecognition.interimResults = true;

      speakRecognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const text = result[0].transcript;
          const isFinal = result.isFinal;

          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'transcription', text, isFinal }));
          }
        }
      };

      speakRecognition.onend = () => {
        if (isSpeaking) speakRecognition.start();
      };

      speakRecognition.onerror = (event) => {
        if (event.error === 'no-speech') return;
        if (isSpeaking && event.error !== 'aborted') {
          setTimeout(() => {
            if (isSpeaking) speakRecognition.start();
          }, 1000);
        }
      };

      speakRecognition.start();
    }

    function stopSpeakRecognition() {
      if (speakRecognition) {
        speakRecognition.abort();
        speakRecognition = null;
      }
    }

    // --- 文字おこし表示 ---
    let currentInterimLine = null;

    function showTranscription(speaker, text, isFinal) {
      const box = document.getElementById('transcriptBox');
      const empty = document.getElementById('transcriptEmpty');
      if (empty) empty.remove();

      if (isFinal) {
        if (currentInterimLine) {
          currentInterimLine.remove();
          currentInterimLine = null;
        }
        const div = document.createElement('div');
        div.className = 'transcript-line';
        div.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="text">${escapeHtml(text)}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      } else {
        if (!currentInterimLine) {
          currentInterimLine = document.createElement('div');
          currentInterimLine.className = 'transcript-line';
          box.appendChild(currentInterimLine);
        }
        currentInterimLine.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="interim">${escapeHtml(text)}</span>`;
        box.scrollTop = box.scrollHeight;
      }
    }

    // --- WebSocket接続 ---
    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}?role=listener&room=${encodeURIComponent(roomId)}&name=${encodeURIComponent(userName)}`;

      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        document.getElementById('connStatus').textContent = 'サーバー接続済み';
        document.getElementById('connStatus').className = 'connection-status connected text-xs mt-3';
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          if (!isReceiving) {
            isReceiving = true;
            setStatus('receiving', '受信中', '音声を再生しています');
          }
          playPCMChunk(event.data);
        } else {
          try {
            const msg = JSON.parse(event.data);
            switch (msg.type) {
              case 'broadcast_started':
                isReceiving = true;
                nextPlayTime = 0;
                setStatus('receiving', '受信中', '音声を再生しています');
                break;
              case 'broadcast_stopped':
                isReceiving = false;
                nextPlayTime = 0;
                setStatus('waiting', '待機中', '説明者が配信を停止しました');
                break;
              case 'host_connected':
                setStatus('waiting', '待機中', '説明者が接続しました。配信開始を待っています...');
                break;
              case 'host_disconnected':
                isReceiving = false;
                nextPlayTime = 0;
                setStatus('disconnected', '切断', '説明者が切断しました');
                break;
              case 'listener_count':
                document.getElementById('listenerInfo').textContent =
                  `現在 ${msg.count} 人が接続中`;
                break;
              case 'speak_allowed':
                startSpeaking();
                break;
              case 'speak_revoked':
                stopSpeaking();
                break;
              case 'speaker_changed':
                if (msg.name && msg.name !== userName) {
                  document.getElementById('otherSpeakerName').textContent = msg.name;
                  document.getElementById('otherSpeaking').style.display = 'block';
                } else {
                  document.getElementById('otherSpeaking').style.display = 'none';
                }
                if (!msg.name && isSpeaking) {
                  stopSpeaking();
                }
                break;
              case 'transcription':
                showTranscription(msg.name, msg.text, msg.isFinal);
                break;
              case 'room_info':
                document.getElementById('roomInfo').textContent = `ルーム: ${msg.name}`;
                break;
              case 'error':
                alert(msg.message);
                break;
            }
          } catch (e) {}
        }
      };

      ws.onclose = () => {
        document.getElementById('connStatus').textContent = 'サーバー切断 - 再接続中...';
        document.getElementById('connStatus').className = 'connection-status disconnected text-xs mt-3';
        isReceiving = false;
        ws = null;
        setTimeout(() => {
          if (isAudioUnlocked) connect();
        }, 3000);
      };

      ws.onerror = () => {};
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- ガイドツアー ---
    const tourSteps = [
      {
        target: '#statusCard',
        title: '音声受信エリア',
        desc: '説明者が配信を開始すると、ここに状態が表示され、音声が自動的に再生されます。',
      },
      {
        target: '.volume-control',
        title: '音量調整',
        desc: 'スライダーで音量を調整できます。聞こえにくい場合はここを操作してください。',
      },
      {
        target: '#handRaiseArea',
        title: '挙手ボタン',
        desc: '質問したいときはこのボタンを押してください。説明者が発言を許可すると、マイクが有効になります。',
      },
      {
        target: '.transcript-panel',
        title: '文字おこし',
        desc: '説明者や発言者の話した内容がリアルタイムで文字に変換されて表示されます。',
      },
    ];
    let tourIndex = 0;

    function startTour() {
      if (localStorage.getItem('koecast_tour_done')) return;
      tourIndex = 0;
      document.getElementById('tourOverlay').style.display = 'flex';
      showTourStep();
    }

    function showTourStep() {
      const step = tourSteps[tourIndex];
      const el = document.querySelector(step.target);
      if (!el) { tourNext(); return; }

      const rect = el.getBoundingClientRect();
      const spotlight = document.getElementById('tourSpotlight');
      const pad = 8;
      spotlight.style.top = (rect.top - pad) + 'px';
      spotlight.style.left = (rect.left - pad) + 'px';
      spotlight.style.width = (rect.width + pad * 2) + 'px';
      spotlight.style.height = (rect.height + pad * 2) + 'px';

      document.getElementById('tourStep').textContent = `${tourIndex + 1} / ${tourSteps.length}`;
      document.getElementById('tourTitle').textContent = step.title;
      document.getElementById('tourDesc').textContent = step.desc;

      const card = document.getElementById('tourCard');
      const isLast = tourIndex === tourSteps.length - 1;
      document.getElementById('tourNext').textContent = isLast ? '完了' : '次へ';

      const cardTop = rect.bottom + 16;
      if (cardTop + 200 > window.innerHeight) {
        card.style.top = 'auto';
        card.style.bottom = (window.innerHeight - rect.top + 16) + 'px';
      } else {
        card.style.top = cardTop + 'px';
        card.style.bottom = 'auto';
      }
      card.style.left = '50%';
      card.style.transform = 'translateX(-50%)';
    }

    function tourNext() {
      tourIndex++;
      if (tourIndex >= tourSteps.length) {
        tourFinish();
      } else {
        showTourStep();
      }
    }

    function tourFinish() {
      localStorage.setItem('koecast_tour_done', '1');
      document.getElementById('tourOverlay').style.display = 'none';
    }
  </script>
</body>
</html>
