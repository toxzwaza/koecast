<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KoeCast - 説明者</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
            surface: { DEFAULT: '#0f172a', card: '#1e293b', input: '#0f172a' },
            accent: { red: '#ef4444', green: '#22c55e', yellow: '#eab308', blue: '#38bdf8' },
          }
        }
      }
    }
  </script>
  <style>
    .indicator { transition: all 0.3s; }
    .indicator.idle { background: #334155; }
    .indicator.broadcasting {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
      50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .connection-status.connected { color: #22c55e; }
    .connection-status.disconnected { color: #ef4444; }

    .hand-raise-item { animation: slideIn 0.3s ease; }
    .hand-raise-item .name::before { content: '✋'; margin-right: 8px; }

    .btn-allow { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .btn-dismiss { background: #475569; color: white; margin-left: 6px; }

    .transcript-line { margin-bottom: 6px; }
    .transcript-line .speaker { color: #818cf8; font-weight: 600; }
    .transcript-line .text { color: #cbd5e1; }
    .transcript-line .interim { color: #64748b; font-style: italic; }

    .transcript-box::-webkit-scrollbar { width: 4px; }
    .transcript-box::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body class="bg-surface min-h-screen flex flex-col items-center p-5 font-sans text-slate-200">

  <div class="flex items-center gap-2 mb-1">
    <span class="text-2xl">🎙️</span>
    <h1 class="text-xl font-bold text-accent-red">KoeCast 説明者</h1>
  </div>
  <div class="text-xs text-slate-500 mb-5" id="roomInfo">ルーム: -</div>

  <!-- エラーメッセージ -->
  <div class="bg-red-600 text-white p-3 rounded-xl mb-3 w-full max-w-[400px] text-center text-sm font-medium" id="errorMsg" style="display:none"></div>

  <!-- ステータスカード -->
  <div class="bg-surface-card rounded-2xl p-6 w-full max-w-[400px] text-center mb-5 border border-slate-700/50 shadow-xl">
    <div class="indicator idle w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl" id="indicator">🎙️</div>
    <div class="text-lg font-semibold mb-2" id="statusText">待機中</div>
    <div class="text-4xl font-bold text-accent-red" id="listenerCount">0</div>
    <div class="text-sm text-slate-400 mt-1">人が聴講中</div>
    <div class="text-xs text-slate-500 mt-2" id="listenerList"></div>
  </div>

  <!-- 発言中バナー -->
  <div class="bg-gradient-to-r from-green-600 to-emerald-500 text-white rounded-2xl p-4 w-full max-w-[400px] text-center mb-3" id="speakingBanner" style="display:none">
    <div class="text-sm">🎤 <span class="font-bold" id="speakerName"></span> が発言中</div>
    <button onclick="revokeSpeak()"
      class="mt-2 px-5 py-2 bg-red-700 hover:bg-red-800 text-white rounded-xl text-sm font-bold cursor-pointer border-none transition-colors">
      発言を終了させる
    </button>
  </div>

  <!-- 挙手通知パネル -->
  <div class="bg-surface-card rounded-2xl p-4 w-full max-w-[400px] mb-5 border border-slate-700/50">
    <h2 class="text-sm font-semibold mb-3 text-accent-yellow flex items-center gap-1.5">
      <span>✋</span> 挙手通知
    </h2>
    <ul class="list-none" id="handRaiseList">
      <li class="no-hands text-slate-500 text-sm text-center py-2" id="noHands">挙手はありません</li>
    </ul>
  </div>

  <!-- 配信コントロール -->
  <div class="w-full max-w-[400px] space-y-2.5 mb-5">
    <button id="btnStart" onclick="startBroadcast()"
      class="w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer bg-gradient-to-r from-red-500 to-rose-600 text-white hover:shadow-lg hover:shadow-red-500/30 transition-all active:scale-[0.98] disabled:opacity-30 disabled:cursor-not-allowed">
      配信開始
    </button>
    <button id="btnStop" onclick="stopBroadcast()" disabled
      class="w-full p-4 border-none rounded-xl text-lg font-bold cursor-pointer bg-slate-600 text-white hover:bg-slate-500 transition-all active:scale-[0.98] disabled:opacity-30 disabled:cursor-not-allowed">
      配信停止
    </button>
  </div>

  <!-- 文字おこしパネル -->
  <div class="bg-surface-card rounded-2xl p-4 w-full max-w-[400px] mb-5 border border-slate-700/50">
    <h2 class="text-sm font-semibold mb-3 text-accent-blue flex items-center gap-1.5">
      <span>📝</span> 文字おこし
    </h2>
    <div class="transcript-box bg-surface rounded-xl p-3 max-h-[200px] overflow-y-auto text-sm leading-relaxed" id="transcriptBox">
      <div class="transcript-empty text-slate-500 text-center" id="transcriptEmpty">配信開始後に表示されます</div>
    </div>
  </div>

  <div class="connection-status disconnected text-xs mt-3" id="connStatus">サーバー未接続</div>

  <script>
    const params = new URLSearchParams(location.search);
    const roomId = params.get('room') || 'default';
    document.getElementById('roomInfo').textContent = `ルーム: ${roomId}`;

    const SAMPLE_RATE = 16000;
    const BUFFER_SIZE = 2048;
    const MAX_PLAYBACK_DELAY = 0.3;

    let ws = null;
    let audioContext = null;
    let stream = null;
    let processorNode = null;
    let sourceNode = null;
    let isBroadcasting = false;
    let recognition = null;
    let listenerSpeaking = false;
    let silentGain = null;

    const handRaisedNames = [];

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}?role=host&room=${encodeURIComponent(roomId)}`;
      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        document.getElementById('connStatus').textContent = 'サーバー接続済み';
        document.getElementById('connStatus').className = 'connection-status connected text-xs mt-3';
      };

      ws.onmessage = (event) => {
        if (event.data instanceof ArrayBuffer) {
          playReceivedAudio(event.data);
          return;
        }
        try {
          const msg = JSON.parse(event.data);

          if (msg.type === 'listener_count') {
            document.getElementById('listenerCount').textContent = msg.count;
            if (msg.names && msg.names.length > 0) {
              document.getElementById('listenerList').textContent = '参加者: ' + msg.names.join(', ');
            } else {
              document.getElementById('listenerList').textContent = '';
            }

          } else if (msg.type === 'error') {
            showError(msg.message);

          } else if (msg.type === 'hand_raised') {
            addHandRaise(msg.name);

          } else if (msg.type === 'hand_lowered') {
            removeHandRaise(msg.name);

          } else if (msg.type === 'listener_joined') {
            // listener_count ���処理

          } else if (msg.type === 'listener_left') {
            removeHandRaise(msg.name);

          } else if (msg.type === 'speaker_changed') {
            updateSpeakingBanner(msg.name);

          } else if (msg.type === 'transcription') {
            showTranscription(msg.name, msg.text, msg.isFinal);

          } else if (msg.type === 'room_info') {
            document.getElementById('roomInfo').textContent = `ルーム: ${msg.name}`;
          }
        } catch (e) {}
      };

      ws.onclose = () => {
        document.getElementById('connStatus').textContent = 'サーバー切断 - 再接続中...';
        document.getElementById('connStatus').className = 'connection-status disconnected text-xs mt-3';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {};
    }

    // --- 聴講者の音声再生 ---
    let playbackContext = null;
    let playbackGain = null;
    let nextPlayTime = 0;

    function ensurePlaybackContext() {
      if (!playbackContext) {
        playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
        playbackGain = playbackContext.createGain();
        playbackGain.connect(playbackContext.destination);
      }
    }

    function playReceivedAudio(int16ArrayBuffer) {
      ensurePlaybackContext();
      if (playbackContext.state === 'suspended') playbackContext.resume();

      const int16 = new Int16Array(int16ArrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7FFF);
      }

      const audioBuffer = playbackContext.createBuffer(1, float32.length, SAMPLE_RATE);
      audioBuffer.getChannelData(0).set(float32);

      const source = playbackContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(playbackGain);

      const now = playbackContext.currentTime;
      if (nextPlayTime < now) {
        nextPlayTime = now + 0.005;
      }
      if (nextPlayTime - now > MAX_PLAYBACK_DELAY) {
        nextPlayTime = now + 0.005;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    // --- 挙手管理 ---
    function addHandRaise(name) {
      if (handRaisedNames.includes(name)) return;
      handRaisedNames.push(name);
      renderHandRaiseList();
    }

    function removeHandRaise(name) {
      const idx = handRaisedNames.indexOf(name);
      if (idx !== -1) {
        handRaisedNames.splice(idx, 1);
        renderHandRaiseList();
      }
    }

    function renderHandRaiseList() {
      const list = document.getElementById('handRaiseList');
      const noHands = document.getElementById('noHands');

      const items = list.querySelectorAll('.hand-raise-item');
      items.forEach(item => item.remove());

      if (handRaisedNames.length === 0) {
        noHands.style.display = 'block';
        return;
      }
      noHands.style.display = 'none';

      handRaisedNames.forEach(name => {
        const li = document.createElement('li');
        li.className = 'hand-raise-item flex items-center justify-between bg-surface rounded-xl px-4 py-3 mb-2';
        li.innerHTML = `
          <span class="name text-sm">${escapeHtml(name)}</span>
          <div class="flex">
            <button class="btn-allow px-4 py-2 text-xs font-bold rounded-lg border-none cursor-pointer" onclick="allowSpeak('${escapeHtml(name)}')">発言許可</button>
            <button class="btn-dismiss px-4 py-2 text-xs font-bold rounded-lg border-none cursor-pointer" onclick="dismissHand('${escapeHtml(name)}')">却下</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function allowSpeak(name) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'allow_speak', name }));
      }
      removeHandRaise(name);
    }

    function dismissHand(name) {
      removeHandRaise(name);
    }

    function revokeSpeak() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'revoke_speak' }));
      }
    }

    function updateSpeakingBanner(name) {
      const banner = document.getElementById('speakingBanner');
      if (name) {
        listenerSpeaking = true;
        document.getElementById('speakerName').textContent = name;
        banner.style.display = 'block';
        nextPlayTime = 0;
        stopSpeechRecognition();
        if (isBroadcasting) {
          document.getElementById('indicator').className = 'indicator idle w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl';
          document.getElementById('statusText').textContent = '受信中 - ' + name + 'が発言中';
        }
      } else {
        listenerSpeaking = false;
        banner.style.display = 'none';
        if (isBroadcasting) {
          document.getElementById('indicator').className = 'indicator broadcasting w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl';
          document.getElementById('statusText').textContent = '配信中';
          startSpeechRecognition();
        }
      }
    }

    // --- 文字おこし ---
    let currentInterimLine = null;

    function showTranscription(speaker, text, isFinal) {
      const box = document.getElementById('transcriptBox');
      const empty = document.getElementById('transcriptEmpty');
      if (empty) empty.remove();

      if (isFinal) {
        if (currentInterimLine) {
          currentInterimLine.remove();
          currentInterimLine = null;
        }
        const div = document.createElement('div');
        div.className = 'transcript-line';
        div.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="text">${escapeHtml(text)}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      } else {
        if (!currentInterimLine) {
          currentInterimLine = document.createElement('div');
          currentInterimLine.className = 'transcript-line';
          box.appendChild(currentInterimLine);
        }
        currentInterimLine.innerHTML = `<span class="speaker">${escapeHtml(speaker)}:</span> <span class="interim">${escapeHtml(text)}</span>`;
        box.scrollTop = box.scrollHeight;
      }
    }

    function startSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('Speech Recognition APIがサポートされていません');
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const text = result[0].transcript;
          const isFinal = result.isFinal;

          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'transcription', text, isFinal }));
          }
        }
      };

      recognition.onend = () => {
        if (isBroadcasting) {
          recognition.start();
        }
      };

      recognition.onerror = (event) => {
        if (event.error === 'no-speech') return;
        console.error('Speech Recognition エラー:', event.error);
        if (isBroadcasting && event.error !== 'aborted') {
          setTimeout(() => {
            if (isBroadcasting) recognition.start();
          }, 1000);
        }
      };

      recognition.start();
    }

    function stopSpeechRecognition() {
      if (recognition) {
        recognition.abort();
        recognition = null;
      }
    }

    // --- 配信制御 ---
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    async function startBroadcast() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: SAMPLE_RATE,
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: SAMPLE_RATE,
        });

        sourceNode = audioContext.createMediaStreamSource(stream);

        processorNode = audioContext.createScriptProcessor(BUFFER_SIZE, 1, 1);
        processorNode.onaudioprocess = (e) => {
          if (!isBroadcasting || !ws || ws.readyState !== WebSocket.OPEN) return;
          if (listenerSpeaking) return;

          const float32 = e.inputBuffer.getChannelData(0);
          const int16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
          }
          ws.send(int16.buffer);
        };

        sourceNode.connect(processorNode);
        silentGain = audioContext.createGain();
        silentGain.gain.value = 0;
        processorNode.connect(silentGain);
        silentGain.connect(audioContext.destination);

        isBroadcasting = true;

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'start_broadcast', sampleRate: SAMPLE_RATE }));
        }

        document.getElementById('indicator').className = 'indicator broadcasting w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl';
        document.getElementById('statusText').textContent = '配信中';
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;

        startSpeechRecognition();

      } catch (err) {
        if (err.name === 'NotAllowedError') {
          showError('マイクの使用が許可されていません。ブラウザの設定を確認してください。');
        } else {
          showError(`マイク取得エラー: ${err.message}`);
        }
      }
    }

    function stopBroadcast() {
      isBroadcasting = false;

      stopSpeechRecognition();

      if (processorNode) { processorNode.disconnect(); processorNode = null; }
      if (silentGain) { silentGain.disconnect(); silentGain = null; }
      if (sourceNode) { sourceNode.disconnect(); sourceNode = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop_broadcast' }));
      }

      document.getElementById('indicator').className = 'indicator idle w-20 h-20 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl';
      document.getElementById('statusText').textContent = '待機中';
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    connect();
  </script>
</body>
</html>
